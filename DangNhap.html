<!DOCTYPE html>
<html lang="vi" dir="ltr">
<head>
    <title>Letmecook | Đăng nhập</title>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>	
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Phudu:wght@300..900&display=swap');

        body{
            margin: 0;                                                                            
            padding: 0;
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
        }
        /* HEADER */
        .divider {
            height: 1px;
            background-color: #ccc;
            margin: 0px 0;
        }
        #header{
            position: sticky;
            top: 0px;
            left: 0px;
            padding: 0px;
            display: grid;
            grid-template-columns: 3fr 7fr ;
        	margin: 0;
        	padding: 0;
        	background-color: black;  
        	opacity: 0.8;  
        	filter: alpha(opacity=80);
        	height: 7vh;
        }
        #top-left{
            text-align: left; 
            text-transform: uppercase;
            padding-left: 5%;
        }
        #top-right{
    	   align-items: center; 
    	   justify-content: right;
            display: flex;
            vertical-align: middle;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            padding-right: 5%;
        }   
        #nav {
    	   display: inline-block;
        }
        .nav-link {
            padding: 20px;
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-family: 'Phudu';
        }
        #imgcover {
            position: absolute;
            width: 100%;
            height: 93vh;
            object-fit: cover;
            opacity: 50%;
            background-color: transparent;
        }
        #border {
            background-color: white;
            width: 450px;
            height: 400px;
            position: relative;
            margin: auto;
            top: 11vh;
            border-radius: 6px;
            border: 2px;
            border-color: black;
        }
        #title{
            display: grid;
            grid-template-columns: 1fr 1px 1fr;
            border: 2px;
            border-color: black;
            text-align: center;
            justify-content: center;
            font-family: 'Phudu';
        }
        #main-login{
            position: relative;
            text-align: center;
        }
        #text-login{
            top: 3vh;
            position: relative;
            font-family: 'Helvetica';
            font-size: 15px;
            padding: 14px 16px;
        }
        #name, #passwd, #sub {
            margin-top: 30px;
            position: relative;
            width: 80%;
            margin: 14px 16px;
            padding: 14px 16px;
        }
        .hr{
            height: 1px;
            width: 100%;
            background-color: black;
        }
        .hc{
            background-color: black;

        }

        </style>
</head>
<body>
    <header>
        <div id="header">
			<div id="top-left">
				<a href="" id="logo" >
					<img src="./Letmecook.png" style="height: 7vh; ">
				</a>
			</div>

			<div id="top-right">
				<div id="nav">
					<a class="nav-link" href="#">Trang Chủ</a>
					<a class="nav-link" href="#about">Giới thiệu</a>
					<a class="nav-link" href="#vertical-list">Danh mục</a>
					<a class="nav-link" href="#main-content">Nổi bật</a>
					<a class="nav-link" href="trangsearch">Tìm kiếm</a>
					<a class="nav-link" href="#contact">Liên hệ</a>
				</div>
			</div>
		</div>
    </header>
    <main>
        <div>
            <img id="imgcover" src="imagecover.jpeg">
        </div>
        <div id="border">
            <div id="title">
                <div id="login">
                    <h2>Đăng nhập</h2>
                </div>
                <div class="hc"> </div>
                <div id="signup">
                    <h2>Đăng ký</h2>
                </div>
            </div>
            <div class="hr"> </div>
            <div id="main-login">
                <div id="text-login">
                    <div>
                        <!--<label for="name">Tên đăng nhập</label>-->
                        <input id="name" type="text" placeholder="Nhập tên đăng nhập">
                    </div>
                    <div>
                        <!--<label for="passwd">Mật khẩu</label>-->
                        <input id="passwd" type="password" placeholder="Nhập mật khẩu">
                    </div>
                    <div><a id="fpw" href="">Quên mật khẩu</div>
                    <div>
                        <input id="sub" type="submit" value="Đăng nhập" style="">
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
